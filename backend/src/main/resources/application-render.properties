# Render profile - activated with SPRING_PROFILES_ACTIVE=render
# Overrides the H2 defaults in application.properties with a Postgres connection
# built from the individual DB_* env vars Render injects via the "fromDatabase" wiring in render.yaml.

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# No migration tool (Flyway/Liquibase) in this project yet - `update` lets Hibernate
# create the schema on first boot. Fine for a POC; switch to `validate` + migrations
# before this holds real data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console is dev-only and must not be exposed publicly
spring.h2.console.enabled=false

# Render's free-tier disks are ephemeral - anything written to app.upload-dir is lost
# on every deploy/restart. Uploaded photos will not survive a redeploy until this is
# swapped for object storage (S3/GCS/etc). Flagged here, not fixed - out of scope for
# this deployment-config pass.
app.upload-dir=./uploads
