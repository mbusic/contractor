# Render profile - activated with --spring.profiles.active=render (set in backend/Dockerfile's ENTRYPOINT)
# The actual Postgres DataSource is provided by RenderDataSourceConfig, which parses
# the DATABASE_URL env var (Render's "connectionString" fromDatabase property) since
# Spring can't consume a postgresql:// URI directly via spring.datasource.url.

# No migration tool (Flyway/Liquibase) in this project yet - `update` lets Hibernate
# create the schema on first boot. Fine for a POC; switch to `validate` + migrations
# before this holds real data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console is dev-only and must not be exposed publicly
spring.h2.console.enabled=false

# Render's free-tier disks are ephemeral - anything written to app.upload-dir is lost
# on every deploy/restart. Uploaded photos will not survive a redeploy until this is
# swapped for object storage (S3/GCS/etc). Flagged here, not fixed - out of scope for
# this deployment-config pass.
app.upload-dir=./uploads
