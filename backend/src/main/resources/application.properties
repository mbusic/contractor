spring.application.name=contractor

# H2 file-mode database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/contractordb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB
app.upload-dir=./uploads

# JWT
app.jwt.secret=${APP_JWT_SECRET:aim-contractor-poc-secret-key-minimum-256-bits-long-for-hs256}
app.jwt.expiration-ms=86400000

# CORS - allowed frontend origin
app.cors.origin=${APP_CORS_ORIGIN:http://localhost:4200}

# Base URL this backend is reachable at (used to build absolute links, e.g. photo URLs in generated documents)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Server - Render (and other PaaS) inject PORT at runtime; falls back to 8080 locally
server.port=${PORT:8080}
