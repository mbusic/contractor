databases:
  - name: contractor-db
    databaseName: contractor
    user: contractor
    plan: free

services:
  # Backend - Spring Boot. Render has no native Java runtime (confirmed against
  # https://render.com/docs/native-runtimes), so this runs via Docker - the only
  # option Render offers for a JVM app. See backend/Dockerfile for the build/run
  # steps and the JVM memory-flag reasoning.
  - type: web
    name: contractor-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contractor-db
          property: connectionString
      - key: APP_JWT_SECRET
        generateValue: true
      # Placeholders - update these in the Render dashboard once both services
      # have their real *.onrender.com URLs (see DEPLOY.md).
      - key: APP_CORS_ORIGIN
        value: https://REPLACE-WITH-YOUR-FRONTEND.onrender.com
      - key: APP_BASE_URL
        value: https://REPLACE-WITH-YOUR-BACKEND.onrender.com

  # Frontend - Angular static build
  - type: web
    name: contractor-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npx @angular/cli@19 build --configuration production
    staticPublishPath: dist/frontend/browser
    routes:
      # Angular client-side routing: serve index.html for any path that isn't a
      # real static file, so refreshing on e.g. /orders/12 doesn't 404.
      - type: rewrite
        source: /*
        destination: /index.html
